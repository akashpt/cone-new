<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConeInspection UI</title>
    <link rel="stylesheet" href="../static/css/index.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>

<body>
    <div class="app">

        <!-- MAIN CONTENT: sidebar + main panels -->
        <div class="content">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <button class="sidebar-btn" onclick="openController()">🕹️ Controller</button>
                <button class="sidebar-btn" onclick="openReport()">📊 Reports</button>
                <button class="sidebar-btn" onclick="openSetting()">⚙️ Settings</button>
                <p class="score">0</p>
                <!-- <p class="cone_color">Color - white</p> -->
                <button class="emergency">🚨 Emergency</button>
            </aside>

            <!-- CENTER + RIGHT PANELS -->
            <main class="main-area">
                 <!-- HEADER: title + logo -->
                <header class="header">
                    <div class="header-title">Cone Inspection System</div>
                    <img src="logo.png" alt="Company Logo" class="header-logo"/>
                </header>
                <div class="panel-row">
                    <!-- CENTER PANEL -->
                    <section class="center-panel" aria-label="Main image and controls">
                        <div class="big-box">
                            <img id="cameraFeed" src="../static/images/front_img.bmp" alt="Main View" class="center-image" />
                        </div>

                        <div class="control-buttons">
                            <button class="circle-btn start" id="btnStart">Start</button>
                            <button class="circle-btn stop" id="btnStop">Stop</button>
                            <button class="circle-btn reset" id="btnReset">Reset</button>
                            <!-- <div>
                                <p>T - <span id="topThresholdValue">0</span></p>
                                <p>B - <span id="bottomThresholdValue">0</span></p>
                            </div> -->
                        </div>
                    </section>

                    <!-- RIGHT PANEL -->
                    <aside class="right-panel" aria-label="Side image views">
                        <p>Thread Image</p>
                        <!-- <p><strong>Diameter</strong> - <span id="thread_dia"></span>mm</p> -->
                        <div class="small-box1">
                            <img src="../static/images/thread.bmp" id="threadImg" alt="Thread View" class="small-box-image" />
                        </div>
                        <p>Ring Image</p>
                        <div class="small-box2">
                            <img src="../static/images/ring.bmp" id="ringImg" alt="Ring View" class="small-box-image2" />
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>

<script>

    let bridge = null;
    let lastUpdate = 0;

    const toast = (msg) => {
        const t = document.getElementById("toast");
        if (!t) { console.log("TOAST:", msg); return; }
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1400);
    };
    new QWebChannel(qt.webChannelTransport, function(channel) {
        bridge = channel.objects.bridge;  // ✅ connect global bridge

        bridge.frame_signal.connect(function(base64Data) {
            const now = Date.now();
            if (now - lastUpdate < 50) return;  // update every 50ms
            lastUpdate = now;

            const img = document.getElementById("cameraFeed");
            img.src = "data:image/jpeg;base64," + base64Data;
        });

        // NEW: cone prediction images (thread + tip)
        bridge.frame_cone.connect(function(jsonStr) {
            try {
                const data = JSON.parse(jsonStr);

                const threadImg = document.getElementById("threadImg");
                const ringImg   = document.getElementById("ringImg");
                //const thread_dia   = document.getElementById("thread_dia");

                if (data.thread) {
                    threadImg.src = "data:image/jpeg;base64," + data.thread;
                }
                if (data.tip) {
                    ringImg.src = "data:image/jpeg;base64," + data.tip;
                }
                //if (data.orad) {
                //    thread_dia.textContent = data.orad;
                //}
            } catch (e) {
                console.error("Invalid cone frame JSON:", e);
            }
        });
    });

     function openController() {
        if (bridge){
          result =  bridge.showController();
          if (!result){
            alert("Machine Running..")
          }
        }else {
            alert("Bridge not connected!");
        }
    }

    function openSetting() {
        if (bridge) bridge.showSetting();
        else alert("Bridge not connected!");
    }

    function openReport() {
        if (bridge) bridge.showReport();
        else alert("Bridge not connected!");
    }
    

  document.addEventListener('DOMContentLoaded', () => {
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnReset = document.getElementById('btnReset');

    btnStart.addEventListener('click', () => {

      if (bridge && bridge.startCamera) {
        bridge.startCamera().then(function(result) {
            if (result === "camera") {
                alert("Camera Not Connected");
            } else if (result === "Air_pressure") {
                alert("Check the air pressure");
            }else if (result === "board_connection"){
                alert("Check the board connection");
            }
        });

      }
    });

    btnStop.addEventListener('click', () => {

      if (bridge && bridge.stopCamera) {
        bridge.stopCamera();          // 🔴 this calls Python slot
      }
    });

    btnReset.addEventListener('click', () => {

      if (bridge && bridge.resetSystem) {
        bridge.resetSystem();         // optional Python slot
      }
    });
  });

</script>
</body>

</html>
